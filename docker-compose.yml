services:
  linkding:
    container_name: "${LD_CONTAINER_NAME:-linkding}"
    build:
      context: .
      dockerfile: docker/default.Dockerfile
    ports:
      - "${LD_HOST_PORT:-9090}:9090"
    volumes:
      - "${LD_HOST_DATA_DIR:-./data}:/etc/linkding/data"
    env_file:
      - .env
    restart: unless-stopped